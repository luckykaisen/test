# Code Review Workflow

name: Code Review

description: A workflow for code reviews, including capabilities for Chinese language support using GitHub Copilot.

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Code Review
        uses: github/copilot@v1
        with:
          language: zh-CN
      - name: Review finishes
        run: echo 'Code review completed!'